cat > app/templates/predict.html << 'EOF'
<!DOCTYPE html>
<html>
<head>
    <title>Predict Digit - MNIST Classifier</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }
        
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
            animation: slideIn 0.5s ease-out;
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 2em;
            margin-bottom: 10px;
        }
        
        .header p {
            opacity: 0.9;
        }
        
        .content {
            padding: 40px;
        }
        
        .upload-area {
            border: 2px dashed #ddd;
            border-radius: 12px;
            padding: 40px;
            text-align: center;
            transition: all 0.3s ease;
            margin-bottom: 20px;
            cursor: pointer;
        }
        
        .upload-area:hover {
            border-color: #667eea;
            background: #f8f9ff;
        }
        
        .upload-area.dragover {
            border-color: #667eea;
            background: #f0f2ff;
            transform: scale(1.02);
        }
        
        .upload-icon {
            font-size: 48px;
            margin-bottom: 15px;
        }
        
        .file-input {
            display: none;
        }
        
        .file-label {
            display: inline-block;
            background: #667eea;
            color: white;
            padding: 12px 30px;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 16px;
            font-weight: bold;
            margin-top: 15px;
        }
        
        .file-label:hover {
            background: #5a67d8;
            transform: translateY(-2px);
        }
        
        .selected-file {
            margin-top: 15px;
            color: #666;
            font-size: 14px;
        }
        
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 14px 40px;
            border-radius: 50px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
            margin-top: 20px;
        }
        
        button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }
        
        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        
        .result {
            margin-top: 20px;
            padding: 20px;
            border-radius: 12px;
            display: none;
            animation: fadeIn 0.3s ease-out;
            text-align: center;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .result.loading {
            background: #fff3cd;
            color: #856404;
            border: 1px solid #ffeeba;
        }
        
        .result.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        
        .result.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        
        .prediction-digit {
            font-size: 80px;
            font-weight: bold;
            margin: 20px 0;
            color: #667eea;
        }
        
        .confidence-bar {
            width: 100%;
            height: 30px;
            background: #e0e0e0;
            border-radius: 15px;
            overflow: hidden;
            margin: 15px 0;
        }
        
        .confidence-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            border-radius: 15px;
            transition: width 0.5s ease;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding-right: 10px;
            color: white;
            font-size: 12px;
            font-weight: bold;
        }
        
        .back-btn {
            display: inline-block;
            text-align: center;
            margin-top: 20px;
            color: #667eea;
            text-decoration: none;
            font-weight: bold;
            transition: all 0.3s ease;
            padding: 10px 20px;
            background: #f8f9fa;
            border-radius: 8px;
        }
        
        .back-btn:hover {
            background: #667eea;
            color: white;
            transform: translateX(-5px);
        }
        
        @media (max-width: 600px) {
            .content {
                padding: 20px;
            }
            
            .prediction-digit {
                font-size: 60px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1> Digit Prediction</h1>
            <p>Upload an image of a handwritten digit</p>
        </div>
        
        <div class="content">
            <div class="upload-area" id="uploadArea">
                <div class="upload-icon"></div>
                <p>Drag and drop your image here</p>
                <p style="color: #666; font-size: 14px; margin: 10px 0;">or</p>
                <label class="file-label" for="imageFile">
                    Browse Files
                </label>
                <input type="file" id="imageFile" accept="image/*" class="file-input">
                <div id="selectedFile" class="selected-file"></div>
            </div>
            
            <button id="predictBtn" disabled> Predict Digit</button>
            
            <div id="result" class="result"></div>
            
            <div style="text-align: center; margin-top: 30px;">
                <a href="/" class="back-btn">← Back to Home</a>
            </div>
        </div>
    </div>

    <script>
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('imageFile');
        const selectedFileDiv = document.getElementById('selectedFile');
        const predictBtn = document.getElementById('predictBtn');
        const resultDiv = document.getElementById('result');
        
        let selectedFile = null;
        
        // Handle file selection
        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                selectedFile = e.target.files[0];
                selectedFileDiv.innerHTML = ` Selected: ${selectedFile.name} (${(selectedFile.size / 1024).toFixed(2)} KB)`;
                predictBtn.disabled = false;
                resultDiv.style.display = 'none';
            }
        });
        
        // Drag and drop functionality
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });
        
        uploadArea.addEventListener('dragleave', (e) => {
            uploadArea.classList.remove('dragover');
        });
        
        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            
            if (e.dataTransfer.files.length > 0) {
                const file = e.dataTransfer.files[0];
                if (file.type.startsWith('image/')) {
                    selectedFile = file;
                    selectedFileDiv.innerHTML = ` Selected: ${selectedFile.name} (${(selectedFile.size / 1024).toFixed(2)} KB)`;
                    predictBtn.disabled = false;
                    resultDiv.style.display = 'none';
                    
                    const dt = new DataTransfer();
                    dt.items.add(file);
                    fileInput.files = dt.files;
                } else {
                    alert('Please upload an image file!');
                }
            }
        });
        
        uploadArea.addEventListener('click', () => {
            fileInput.click();
        });
        
        // Handle prediction
        predictBtn.addEventListener('click', async () => {
            if (!selectedFile) {
                alert('Please select an image first');
                return;
            }
            
            const formData = new FormData();
            formData.append('file', selectedFile);
            
            resultDiv.style.display = 'block';
            resultDiv.className = 'result loading';
            resultDiv.innerHTML = '<strong> Processing your image...</strong><br>Analyzing with AI model...';
            predictBtn.disabled = true;
            
            try {
                const response = await fetch('/predict', { method: 'POST', body: formData });
                const data = await response.json();
                
                if (response.ok) {
                    const confidencePercent = (data.confidence * 100).toFixed(2);
                    resultDiv.className = 'result success';
                    resultDiv.innerHTML = `
                        <strong> Prediction Result</strong>
                        <div class="prediction-digit">${data.prediction}</div>
                        <p>I'm ${confidencePercent}% confident this is a digit ${data.prediction}</p>
                        <div class="confidence-bar">
                            <div class="confidence-fill" style="width: ${confidencePercent}%;">
                                ${confidencePercent}%
                            </div>
                        </div>
                        <p style="margin-top: 10px;"> Model prediction successful!</p>
                    `;
                } else {
                    resultDiv.className = 'result error';
                    resultDiv.innerHTML = `
                        <strong> Error:</strong><br>
                        ${data.error}<br>
                        <small>Please try another image.</small>
                    `;
                }
            } catch (error) {
                resultDiv.className = 'result error';
                resultDiv.innerHTML = `
                    <strong> Network Error:</strong><br>
                    ${error.message}<br>
                    <small>Please make sure the server is running.</small>
                `;
            } finally {
                predictBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
EOF
